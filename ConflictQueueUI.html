<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Sarabun', sans-serif; padding: 10px; background-color: #f5f5f5; }
      h2 { color: #333; text-align: center; margin-bottom: 10px; }
      .container { max-width: 800px; margin: 0 auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
      .queue-item { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #fff; }
      .queue-item.conflict { border-left: 5px solid #ff9800; }
      .info-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
      .label { font-weight: bold; color: #555; }
      .value { color: #333; }
      .conflict-reason { color: #d32f2f; font-weight: bold; font-size: 13px; margin-top: 5px; background: #ffebee; padding: 5px; border-radius: 3px; }
      .actions { text-align: right; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
      button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Sarabun', sans-serif; font-weight: 600; margin-left: 5px; }
      .btn-approve { background-color: #4CAF50; color: white; }
      .btn-approve:hover { background-color: #45a049; }
      .btn-reject { background-color: #f44336; color: white; }
      .btn-reject:hover { background-color: #da190b; }
      .btn-close { background-color: #9e9e9e; color: white; margin-top: 15px; width: 100%; }
      .loading { text-align: center; padding: 20px; color: #666; }
      .empty-msg { text-align: center; color: #4CAF50; font-weight: bold; padding: 20px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>🛠️ จัดการรายการติดขัด (Conflict Queue)</h2>
      <div id="content">
        <div class="loading">กำลังโหลดข้อมูล...</div>
      </div>
      <button class="btn-close" onclick="google.script.host.close()">ปิดหน้าต่าง</button>
    </div>

    <script>
      // โหลดข้อมูลเมื่อเปิดหน้า
      window.onload = function() {
        google.script.run.withSuccessHandler(renderQueue).V5_GetConflictQueueData();
      };

      function renderQueue(items) {
        const container = document.getElementById('content');
        container.innerHTML = '';

        if (!items || items.length === 0) {
          container.innerHTML = '<div class="empty-msg">✅ เยี่ยมมาก! ไม่มีรายการติดค้างที่ต้องตรวจสอบ</div>';
          return;
        }

        items.forEach((item, index) => {
          const div = document.createElement('div');
          div.className = 'queue-item conflict';
          div.innerHTML = `
            <div class="info-row"><span class="label">ชื่อ:</span> <span class="value">${item.name}</span></div>
            <div class="info-row"><span class="label">พิกัด:</span> <span class="value">${item.latlng}</span></div>
            <div class="info-row"><span class="label">ที่อยู่:</span> <span class="value">${item.address || '-'}</span></div>
            <div class="conflict-reason">⚠️ เหตุผล: ${item.reason}</div>
            <div class="info-row" style="margin-top:5px; font-size:12px; color:#777;">
              <span>Entity ID: ${item.entityId.substring(0,8)}...</span>
              <span>Location ID: ${item.locId.substring(0,8)}...</span>
            </div>
            <div class="actions">
              <button class="btn-reject" onclick="resolveItem(${index}, 'REJECT')">❌ ปฏิเสธ/ข้าม</button>
              <button class="btn-approve" onclick="resolveItem(${index}, 'APPROVE')">✅ อนุมัติและบันทึก</button>
            </div>
          `;
          container.appendChild(div);
        });
      }

      function resolveItem(index, action) {
        const btns = document.querySelectorAll('.actions button');
        // ปิดปุ่มทั้งหมดชั่วคราวเพื่อป้องกันการกดซ้ำ
        btns.forEach(b => b.disabled = true);

        google.script.run.withSuccessHandler(function(newItems) {
          renderQueue(newItems); // โหลดรายการใหม่หลังจัดการ
        }).V5_ProcessConflictAction(index, action);
      }
    </script>
  </body>
</html>
